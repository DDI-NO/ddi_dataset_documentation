  bioch_BiochemistryData:
    enabled: true
    display_name: "Blood Biomarkers"
    sidecar_path: "../xnat-plugins/xnat-apgem-plugin/src/main/resources/schemas/bioch/display/bioch_BiochemistryData_display.meta.yaml"
    page_slug: "blood_biomarkers"
    scope_md: "content/experiments/bioch_BiochemistryData.md"
  csf_CSFData:
    enabled: true
    display_name: "CSF Biomarkers"
