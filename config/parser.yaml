    page_slug: "mri_report"
    scope_md: "content/experiments/mrrep_MRIReportData.md"

flat_dataset:
  include_experiments:
    - "dem_ddiDemographicData"
    - "mh_MedHistData"
    - "cs_CogScrData"
    - "phyex_phyExamData"
    - "diag_DiagnosisData"
  computed_variables_spec: "config/computed.yaml"
