display_version: "dump"
sidecar_roots:
  - "../xnat-plugins/xnat-apgem-plugin/src/main/resources/schemas"

experiments:
  dem_ddiDemographicData:
    enabled: true
    display_name: "Demographics"
    sidecar_path: "../xnat-plugins/xnat-apgem-plugin/src/main/resources/schemas/dem/display/dem_ddiDemographicData_display.meta.yaml"
    page_slug: "demographics"
    scope_md: "content/experiments/dem_ddiDemographicData.md"
  mh_MedHistData:
    enabled: true
    display_name: "Medical History"
    sidecar_path: "../xnat-plugins/xnat-apgem-plugin/src/main/resources/schemas/mh/display/mh_MedHistData_display.meta.yaml"
    page_slug: "medhist"
    scope_md: "content/experiments/mh_MedHistData.md"
  phyex_phyExamData:
    enabled: true
    display_name: "Physical Examination"
    sidecar_path: "../xnat-plugins/xnat-apgem-plugin/src/main/resources/schemas/phyex/display/phyex_phyExamData_display.meta.yaml"
    page_slug: "physical_exam"
    scope_md: "content/experiments/phyex_phyExamData.md"
  cs_CogScrData:
    enabled: true
    display_name: "Cognitive Screening"
    sidecar_path: "../xnat-plugins/xnat-apgem-plugin/src/main/resources/schemas/cs/display/cs_CogScrData_display.meta.yaml"
    page_slug: "cognitive_screening"
    scope_md: "content/experiments/cs_CogScrData.md"
  diag_DiagnosisData:
